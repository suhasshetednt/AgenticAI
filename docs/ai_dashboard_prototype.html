<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ops Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        surface: 'rgba(17, 17, 17, 0.7)',
                        primary: '#3B82F6',
                        success: '#10B981',
                        warning: '#F59E0B',
                        error: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: #ededed; overflow: hidden; margin: 0; }
        .glass { background: rgba(17, 17, 17, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .grid-bg {
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 40%),
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        .glow-blue { box-shadow: 0 0 20px 0px rgba(59,130,246,0.4); }
        .glow-amber { box-shadow: 0 0 20px 0px rgba(245,158,11,0.4); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { Terminal, Activity, GitCommit, Database, FileText, CheckCircle2, Clock, LayoutDashboard, Cpu, Network, AlertCircle, RefreshCw, Layers } from 'lucide-react';

        // --- Mock Data & Config ---
        const INITIAL_NODES = [
            { id: 'jira', label: 'Jira Agent', icon: LayoutDashboard, x: 100, y: 150, status: 'completed', time: '1.2s' },
            { id: 'doc', label: 'Documentation', icon: FileText, x: 350, y: 150, status: 'completed', time: '8.4s' },
            { id: 'dremio', label: 'Dremio Agent', icon: Database, x: 350, y: 350, status: 'running', time: '...' },
            { id: 'qlik', label: 'Qlik Agent', icon: Activity, x: 600, y: 350, status: 'pending', time: '-' },
            { id: 'git', label: 'GitHub Agent', icon: GitCommit, x: 850, y: 350, status: 'pending', time: '-' },
        ];

        const EDGES = [
            { source: 'jira', target: 'doc' },
            { source: 'doc', target: 'dremio' },
            { source: 'dremio', target: 'qlik' },
            { source: 'qlik', target: 'git' },
        ];

        // --- Components ---
        
        const Edge = ({ startX, startY, endX, endY, isActive }) => {
            const path = `M ${startX} ${startY} L ${startX} ${endY} L ${endX} ${endY}`;
            return (
                <svg className="absolute inset-0 pointer-events-none w-full h-full" style={{ zIndex: 0 }}>
                    <path d={path} stroke="rgba(255,255,255,0.1)" strokeWidth="2" fill="none" />
                    {isActive && (
                        <motion.circle
                            r="4"
                            fill="#3B82F6"
                            style={{ filter: 'drop-shadow(0 0 4px #3B82F6)' }}
                            animate={{
                                offsetDistance: ["0%", "100%"]
                            }}
                            transition={{
                                duration: 1.5,
                                repeat: Infinity,
                                ease: "linear"
                            }}
                            style={{ offsetPath: `path('${path}')` }}
                        />
                    )}
                </svg>
            );
        };

        const Node = ({ node, isActive }) => {
            const Icon = node.icon;
            
            let borderClass = 'border-white/10';
            let bgClass = 'bg-[#111]';
            let iconColor = 'text-gray-400';
            
            if (node.status === 'completed') {
                borderClass = 'border-success/50';
                iconColor = 'text-success';
            } else if (node.status === 'running') {
                borderClass = 'border-primary glow-blue';
                iconColor = 'text-primary';
            } else if (node.status === 'error') {
                borderClass = 'border-error';
                iconColor = 'text-error';
            } else if (node.status === 'healing') {
                borderClass = 'border-warning glow-amber';
                iconColor = 'text-warning';
            }

            return (
                <motion.div 
                    className={`absolute glass rounded-xl p-4 w-64 border flex flex-col gap-3 cursor-pointer transition-colors duration-300 ${borderClass} ${bgClass}`}
                    style={{ left: node.x, top: node.y, zIndex: 10 }}
                    whileHover={{ scale: 1.02, y: -2 }}
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                >
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <Icon size={18} className={iconColor} />
                            <span className="font-semibold text-sm">{node.label}</span>
                        </div>
                        {node.status === 'completed' && <CheckCircle2 size={16} className="text-success" />}
                        {node.status === 'running' && <motion.div animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 2, ease: "linear" }}><Loader2 size={16} className="text-primary" /></motion.div>}
                        {node.status === 'healing' && <motion.div animate={{ rotate: -360 }} transition={{ repeat: Infinity, duration: 3, ease: "linear" }}><RefreshCw size={16} className="text-warning" /></motion.div>}
                        {node.status === 'error' && <AlertCircle size={16} className="text-error" />}
                        {node.status === 'pending' && <Clock size={16} className="text-gray-600" />}
                    </div>
                    
                    <div className="flex justify-between items-end text-xs text-gray-400 font-mono mt-1">
                        <span className="bg-black/30 px-2 py-1 rounded">
                            {node.status === 'running' ? 'generating SQL...' : 
                             node.status === 'healing' ? 'auto-fixing query...' :
                             node.status.toUpperCase()}
                        </span>
                        <span>{node.time}</span>
                    </div>
                    
                    {node.status === 'running' && (
                        <div className="h-1 w-full bg-gray-800 rounded-full overflow-hidden mt-1">
                            <motion.div 
                                className="h-full bg-primary"
                                initial={{ width: "0%" }}
                                animate={{ width: "80%" }}
                                transition={{ duration: 4, ease: "easeOut" }}
                            />
                        </div>
                    )}
                </motion.div>
            );
        };

        const Loader2 = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
        );

        // --- Main App ---
        const App = () => {
            const [nodes, setNodes] = useState(INITIAL_NODES);
            const [logs, setLogs] = useState([
                { time: '10:00:01', source: 'System', msg: 'Orchestrator started Run #1042', type: 'info' },
                { time: '10:00:02', source: 'JiraAgent', msg: 'Fetched requirements for ADL-1684', type: 'success' },
                { time: '10:00:10', source: 'DocAgent', msg: 'Generated Project Documentation.docx', type: 'success' },
                { time: '10:00:11', source: 'DremioAgent', msg: 'Analyzing requirements...', type: 'info' },
            ]);

            useEffect(() => {
                // Simulate the live execution story
                let t = setTimeout(() => {
                    setLogs(prev => [...prev, { time: '10:00:14', source: 'DremioAgent', msg: 'Executing validate_sql_query()...', type: 'info' }]);
                }, 3000);

                t = setTimeout(() => {
                    setNodes(ns => ns.map(n => n.id === 'dremio' ? { ...n, status: 'error' } : n));
                    setLogs(prev => [...prev, { time: '10:00:16', source: 'DremioAPI', msg: "Validation FAILED: Expression 'rt.ref_date' is not in the select clause", type: 'error' }]);
                }, 5000);

                t = setTimeout(() => {
                    setNodes(ns => ns.map(n => n.id === 'dremio' ? { ...n, status: 'healing' } : n));
                    setLogs(prev => [...prev, { time: '10:00:17', source: 'System', msg: 'Intercepted Dremio error. Triggering Auto-Heal loop...', type: 'warning' }]);
                }, 7000);

                t = setTimeout(() => {
                    setLogs(prev => [...prev, { time: '10:00:20', source: 'DremioAgent', msg: 'Rewriting SQL to include ORDER BY column in DISTINCT SELECT...', type: 'info' }]);
                }, 10000);

                t = setTimeout(() => {
                    setNodes(ns => ns.map(n => n.id === 'dremio' ? { ...n, status: 'completed', time: '12.3s' } : n));
                    setNodes(ns => ns.map(n => n.id === 'qlik' ? { ...n, status: 'running' } : n));
                    setLogs(prev => [...prev, { time: '10:00:23', source: 'DremioAPI', msg: 'VDS created successfully: dremio-db.apu_health.apu_health', type: 'success' }]);
                }, 14000);

            }, []);

            return (
                <div className="flex h-screen w-screen font-sans bg-background text-white overflow-hidden">
                    
                    {/* Left Canvas Area */}
                    <div className="flex-1 relative grid-bg flex flex-col">
                        {/* Header */}
                        <div className="h-14 glass flex items-center px-6 justify-between border-b border-white/10 z-20">
                            <div className="flex items-center gap-4">
                                <Network className="text-primary" size={20} />
                                <h1 className="font-semibold tracking-wide">ADL Workflow Orchestrator</h1>
                                <span className="px-2 py-0.5 rounded text-xs bg-primary/20 text-primary border border-primary/30">Live Execution</span>
                            </div>
                            <div className="flex items-center gap-6 text-sm text-gray-400">
                                <div className="flex items-center gap-2"><Cpu size={16}/> gpt-4o</div>
                                <div className="flex items-center gap-2"><Layers size={16}/> LangGraph</div>
                            </div>
                        </div>

                        {/* Nodes Area */}
                        <div className="flex-1 relative">
                            {/* Draw Edges */}
                            {EDGES.map((edge, i) => {
                                const source = nodes.find(n => n.id === edge.source);
                                const target = nodes.find(n => n.id === edge.target);
                                const isActive = source.status === 'running' || source.status === 'healing';
                                return (
                                    <Edge 
                                        key={i}
                                        startX={source.x + 128} // node width / 2
                                        startY={source.y + 40} // node height / 2 approx
                                        endX={target.x + 128}
                                        endY={target.y - 10}
                                        isActive={isActive}
                                    />
                                );
                            })}

                            {/* Draw Nodes */}
                            {nodes.map(node => (
                                <Node key={node.id} node={node} />
                            ))}
                        </div>
                        
                        {/* Bottom Metrics Panel */}
                        <div className="h-32 glass border-t border-white/10 z-20 p-4 flex gap-6">
                            <div className="flex-1 bg-black/40 rounded-lg border border-white/5 p-4 flex flex-col justify-between">
                                <div className="text-xs text-gray-400 uppercase tracking-wider">Total Pipeline Tokens</div>
                                <div className="text-2xl font-mono text-white">42,891 <span className="text-sm text-gray-500">tokens</span></div>
                                <div className="text-xs text-success flex items-center gap-1"><Activity size={12}/> ~$0.21 spend</div>
                            </div>
                            <div className="flex-1 bg-black/40 rounded-lg border border-white/5 p-4 flex flex-col justify-between">
                                <div className="text-xs text-gray-400 uppercase tracking-wider">Active Run Time</div>
                                <div className="text-2xl font-mono text-white">00:00:23</div>
                                <div className="text-xs text-primary flex items-center gap-1"><Clock size={12}/> Dremio Auto-healing</div>
                            </div>
                            <div className="flex-1 bg-black/40 rounded-lg border border-white/5 p-4 flex flex-col justify-between">
                                <div className="text-xs text-gray-400 uppercase tracking-wider">Node Health Status</div>
                                <div className="text-2xl font-mono text-white">1 <span className="text-sm text-warning">Recovered</span></div>
                                <div className="text-xs text-gray-500 flex items-center gap-1">0 fatal errors</div>
                            </div>
                        </div>
                    </div>

                    {/* Right Sidebar - Live Activity Feed */}
                    <div className="w-96 glass border-l border-white/10 z-20 flex flex-col">
                        <div className="h-14 flex items-center px-4 border-b border-white/10 gap-2">
                            <Terminal size={18} className="text-gray-400"/>
                            <span className="font-semibold text-sm">Live Activity Stream</span>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3 font-mono text-xs">
                            <AnimatePresence>
                                {logs.map((log, i) => {
                                    let color = 'text-gray-400';
                                    let border = 'border-gray-800';
                                    if (log.type === 'success') { color = 'text-success'; border = 'border-success/30'; }
                                    if (log.type === 'error') { color = 'text-error'; border = 'border-error/30'; }
                                    if (log.type === 'warning') { color = 'text-warning'; border = 'border-warning/30'; }
                                    if (log.type === 'info') { color = 'text-primary'; border = 'border-primary/30'; }

                                    return (
                                        <motion.div 
                                            key={i}
                                            initial={{ opacity: 0, x: 20 }}
                                            animate={{ opacity: 1, x: 0 }}
                                            className={`p-3 bg-black/40 rounded border-l-2 ${border} flex flex-col gap-1`}
                                        >
                                            <div className="flex justify-between text-[10px] text-gray-500">
                                                <span>{log.source}</span>
                                                <span>{log.time}</span>
                                            </div>
                                            <div className={`${color} leading-relaxed`}>
                                                {log.msg}
                                            </div>
                                        </motion.div>
                                    )
                                })}
                            </AnimatePresence>
                            {/* Blinking Cursor */}
                            <motion.div 
                                animate={{ opacity: [1, 0] }} 
                                transition={{ repeat: Infinity, duration: 0.8 }}
                                className="w-2 h-4 bg-primary mt-2"
                            />
                        </div>
                    </div>

                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
