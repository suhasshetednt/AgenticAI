<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Ops Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        surface: 'rgba(17, 17, 17, 0.7)',
                        primary: '#3B82F6',
                        success: '#10B981',
                        warning: '#F59E0B',
                        error: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: #ededed; overflow: hidden; margin: 0; }
        .glass { background: rgba(17, 17, 17, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.15; }
        .grid-bg {
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 40%),
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,180,255,0.2); border-radius: 10px; }
        select { appearance: none; }

        /* ── TURBINE ── */
        .turb-blades { transform-origin: 100px 100px; }
        .turb-blades.t-spinning { animation: turb-spin 0.7s linear infinite; }
        .turb-blades.t-idle    { animation: turb-spin 5s  linear infinite; }
        @keyframes turb-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        .turb-btn { background:transparent; border:none; cursor:pointer; outline:none; border-radius:50%; padding:6px; transition:transform .3s; display:block; }
        .turb-btn:hover:not(:disabled) { transform:scale(1.05); }
        .turb-btn:disabled { cursor:not-allowed; }

        .engine-panel {
            position:relative; display:flex; flex-direction:column; align-items:center;
            padding: 20px 20px 14px; background:rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(0,180,255,0.15);
        }
        .engine-panel::before { content:''; position:absolute; top:8px; left:8px;  width:12px; height:12px; border-top:1.5px solid rgba(0,180,255,0.45); border-left:1.5px solid rgba(0,180,255,0.45); }
        .engine-panel::after  { content:''; position:absolute; bottom:8px; right:8px; width:12px; height:12px; border-bottom:1.5px solid rgba(0,180,255,0.45); border-right:1.5px solid rgba(0,180,255,0.45); }
        .engine-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:3px; text-transform:uppercase; color:rgba(0,180,255,0.45); margin-bottom:12px; }
        .rpm-bar { display:inline-block; width:5px; height:4px; border-radius:1px; }

        /* ── CONSOLE PANEL (right side) ── */
        .console-panel {
            width: 500px; flex-shrink:0;
            background: #050d18;
            border-left: 1px solid rgba(0,180,255,0.18);
            box-shadow: -20px 0 60px rgba(0,0,0,0.8);
            display:flex; flex-direction:column;
            position:relative; z-index:20;
        }
        .console-panel::before {
            content:''; position:absolute; top:0; left:0;
            width:1px; height:100%;
            background: linear-gradient(180deg, transparent, rgba(0,180,255,0.4) 30%, rgba(0,180,255,0.4) 70%, transparent);
        }

        /* ── TERMINAL LINES ── */
        .t-line {
            padding: 7px 12px;
            border-left: 2px solid rgba(0,180,255,0.2);
            background: rgba(0,180,255,0.025);
            border-radius: 0 3px 3px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; line-height: 1.65;
            color: #6ea8c8; letter-spacing: 0.3px;
            white-space: pre;
            text-align: left;
            transition: border-color 0.2s, background 0.2s;
        }
        .t-line:hover { border-color: rgba(0,180,255,0.45); background: rgba(0,180,255,0.04); }
        .t-line.t-sep { border-color: rgba(0,180,255,0.08); color: rgba(0,180,255,0.22); }
        .t-line.t-hdr { border-color: #00b4ff; color: #00b4ff; letter-spacing: 1px; font-weight:600; }
        .t-line.t-err { border-color: #EF4444; color: #f87171; }

        .t-prompt-wrap {
            border: 1px solid rgba(0,180,255,0.4);
            background: rgba(0,180,255,0.06);
            border-radius: 5px; padding: 10px 14px;
            display:flex; align-items:center; gap:10px;
            box-shadow: 0 0 20px rgba(0,180,255,0.1);
            margin-top: 6px;
        }
        .t-prompt-text { font-family:'JetBrains Mono',monospace; font-size:11px; color:#00b4ff; white-space:pre-wrap; flex-shrink:0; max-width:55%; }
        .t-prompt-input { background:transparent; border:none; outline:none; color:#00b4ff; font-family:'JetBrains Mono',monospace; font-size:11px; flex:1; }
        .t-cursor { width:8px; height:14px; background:#00b4ff; animation: cur 1s step-end infinite; }
        @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

        .t-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; opacity:.25; }
        .t-empty-lbl { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:3px; color:#00b4ff; }

        /* ── TITLE 3-D GLOW — ASL navy depth extrusion + sky-blue luminance pulse ── */
        @keyframes title-glow {
            0%,100% {
                filter:
                    drop-shadow(0 1px 0 #0d2348)
                    drop-shadow(0 3px 0 rgba(10,28,60,.8))
                    drop-shadow(0 5px 3px rgba(5,12,35,.55))
                    drop-shadow(0 0  8px rgba(89,163,217,.28))
                    drop-shadow(0 0 22px rgba(27,58,107,.18));
            }
            50% {
                filter:
                    drop-shadow(0 1px 0 #0d2348)
                    drop-shadow(0 3px 0 rgba(10,28,60,.8))
                    drop-shadow(0 5px 3px rgba(5,12,35,.55))
                    drop-shadow(0 0 18px rgba(137,196,225,.85))
                    drop-shadow(0 0 40px rgba(27,58,107,.50));
            }
        }

    </style>
</head>
<body>
<div id="root"></div>

<script type="importmap">
{
    "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
    }
}
</script>
<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef}from'react';
import{createRoot}from'react-dom/client';
import{motion}from'framer-motion';
import{Activity,RefreshCw}from'lucide-react';

// ─── NODE LAYOUT — pentagon mesh (5 nodes, fully connected) ──────────────────
// Centre (480, 490), radius 300. Flow order: jira(top)→doc(TL)→dremio(BL)→qlik(BR)→git(TR)
// Node box is NW×NH = 128×180 px, so top-left = centre − (64, 90).
const NODES_INIT = [
    {id:'jira',  label:'Jira Agent',    icon:'https://cdn.worldvectorlogo.com/logos/jira-3.svg',                             x:416, y:110, theme:'from-blue-400 to-blue-600',       color:'#3B82F6', status:'pending', time:'-'},
    {id:'doc',   label:'Documentation', icon:'https://cdn-icons-png.flaticon.com/512/3979/3979305.png',                       x:131, y:317, theme:'from-orange-400 to-orange-600',   color:'#F97316', status:'pending', time:'-'},
    {id:'dremio',label:'Dremio Agent',  icon:'https://www.vectorlogo.zone/logos/dremio/dremio-icon.svg',                      x:240, y:653, theme:'from-teal-400 to-teal-600',       color:'#5BC8C8', status:'pending', time:'-'},
    {id:'qlik',  label:'Qlik Agent',    icon:'https://images.icon-icons.com/2107/PNG/512/file_type_qlikview_icon_130217.png', x:592, y:653, theme:'from-green-400 to-green-600',     color:'#22C55E', status:'pending', time:'-'},
    {id:'git',   label:'GitHub Agent',  icon:'https://cdn.worldvectorlogo.com/logos/github-icon-1.svg',                       x:701, y:317, theme:'from-purple-400 to-purple-600',   color:'#A855F7', status:'pending', time:'-'},
];

// ─── EDGES — fully-connected mesh (10 edges = 5×4/2) ─────────────────────────
// type:'flow'  = primary pipeline perimeter (jira→doc→dremio→qlik→git), slightly brighter
// type:'mesh'  = cross-links (every remaining pair), dimmer dashed; any agent can use these
const EDGE_DEFS = [
    // Primary delivery flow — pentagon perimeter, clockwise
    {id:'j-d',  a:'jira',  b:'doc',    type:'flow'},
    {id:'d-dr', a:'doc',   b:'dremio', type:'flow'},
    {id:'dr-q', a:'dremio',b:'qlik',   type:'flow'},
    {id:'q-g',  a:'qlik',  b:'git',    type:'flow'},
    // Mesh cross-links — every remaining pair (drawn behind the flow edges)
    {id:'j-dr', a:'jira',  b:'dremio', type:'mesh'},
    {id:'j-q',  a:'jira',  b:'qlik',   type:'mesh'},
    {id:'j-g',  a:'jira',  b:'git',    type:'mesh'},
    {id:'d-q',  a:'doc',   b:'qlik',   type:'mesh'},
    {id:'d-g',  a:'doc',   b:'git',    type:'mesh'},
    {id:'dr-g', a:'dremio',b:'git',    type:'mesh'},
];

// ─── TURBINE ─────────────────────────────────────────────────────────────────
const TurbineSVG = ({spinning, idle}) => {
    const cls = spinning ? 't-spinning' : idle ? 't-idle' : '';
    return (
        <svg viewBox="0 0 200 200" width="195" height="195" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="tcg" cx="50%" cy="50%" r="50%">
                    <stop offset="0%"   stopColor={spinning?"#ff9900":"#003f7d"}/>
                    <stop offset="100%" stopColor={spinning?"#6b1f00":"#001833"}/>
                </radialGradient>
                <filter id="tfg"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <clipPath id="tcc"><circle cx="100" cy="100" r="87"/></clipPath>
            </defs>
            <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(0,180,255,0.28)" strokeWidth="2"/>
            <circle cx="100" cy="100" r="87" fill="#040d18"/>
            <g clipPath="url(#tcc)">
                <g className={`turb-blades ${cls}`} style={{transformOrigin:'100px 100px'}}>
                    {Array.from({length:9}).map((_,i)=>{
                        const a=(i*40)*Math.PI/180,r1=19,r2=75;
                        const bc=spinning?`rgba(${175+i*7},${55+i*5},0,.9)`:`rgba(0,${95+i*10},${155+i*5},.85)`;
                        const be=spinning?`rgba(255,${110+i*10},0,.55)`:`rgba(0,${155+i*7},255,.45)`;
                        const ix1=100+r1*Math.cos(a-.25),iy1=100+r1*Math.sin(a-.25);
                        const ix2=100+r1*Math.cos(a+.17),iy2=100+r1*Math.sin(a+.17);
                        const ox1=100+r2*Math.cos(a+.44),oy1=100+r2*Math.sin(a+.44);
                        const ox2=100+r2*Math.cos(a+.08),oy2=100+r2*Math.sin(a+.08);
                        const c1x=100+42*Math.cos(a-.1),c1y=100+42*Math.sin(a-.1);
                        const c2x=100+52*Math.cos(a+.53),c2y=100+52*Math.sin(a+.53);
                        const d=`M${ix1} ${iy1} C${c1x} ${c1y},${c2x} ${c2y},${ox1} ${oy1} L${ox2} ${oy2} C${c2x} ${c2y},${ix2} ${iy2},${ix2} ${iy2}Z`;
                        return <g key={i}><path d={d} fill={bc} stroke={be} strokeWidth=".5"/>
                            <path d={`M${ix1} ${iy1} C${c1x} ${c1y},${c2x} ${c2y},${ox1} ${oy1}`} fill="none" stroke={spinning?"rgba(255,195,90,.32)":"rgba(110,205,255,.28)"} strokeWidth="1"/>
                        </g>;
                    })}
                    <circle cx="100" cy="100" r="21" fill={spinning?"rgba(255,70,0,.55)":"rgba(0,70,152,.55)"} filter="url(#tfg)"/>
                    <circle cx="100" cy="100" r="16" fill="#020810"/>
                </g>
            </g>
            <circle cx="100" cy="100" r="13"  fill="url(#tcg)" filter="url(#tfg)"/>
            <circle cx="100" cy="100" r="7"   fill={spinning?"#ff8800":"#0077bb"}/>
            <circle cx="100" cy="100" r="3.5" fill="white" opacity=".92"/>
            <circle cx="100" cy="100" r="80"  fill="none" stroke={spinning?"rgba(255,110,0,.38)":"rgba(0,180,255,.32)"} strokeWidth="2.5" strokeDasharray="7 4"/>
            <text x="100" y="166" textAnchor="middle" fill={spinning?"rgba(255,175,0,.78)":"rgba(0,180,255,.68)"} fontFamily="Orbitron,monospace" fontSize="7.5" letterSpacing="3" fontWeight="600">{spinning?'AFTERBURNER':'IGNITE'}</text>
            <text x="100" y="178" textAnchor="middle" fill={spinning?"rgba(255,135,0,.55)":"rgba(0,145,220,.48)"} fontFamily="Orbitron,monospace" fontSize="7" letterSpacing="2">{spinning?'ENGAGED':'AFTERBURNER'}</text>
        </svg>
    );
};

// ─── EDGE SVG ─────────────────────────────────────────────────────────────────
// Returns path string for an edge given node positions
// NODE_W=128 node box width, NODE_H=180 node box height
const NW=128, NH=180;

// Pentagon centre — used to bow mesh cross-links OUTWARD so they arc around the
// perimeter and never cross through the hub in an ugly way.
const MESH_CX = 480, MESH_CY = 490;

const getEdgePath = (edge, nodesMap) => {
    const A = nodesMap[edge.a];
    const B = nodesMap[edge.b];
    if(!A||!B) return '';
    // All edges: centre-to-centre quadratic bezier
    const ax=A.x+NW/2, ay=A.y+NH/2;
    const bx=B.x+NW/2, by=B.y+NH/2;
    const mx=(ax+bx)/2,  my=(ay+by)/2;
    const len=Math.hypot(bx-ax, by-ay)||1;
    let cx, cy;
    if(edge.type==='flow'){
        // Flow: gentle bow perpendicular-left of travel direction
        const dx=bx-ax, dy=by-ay;
        const nx=-dy/len, ny=dx/len;
        const bow=Math.min(45, len*0.09);
        cx=mx+nx*bow; cy=my+ny*bow;
    } else {
        // Mesh cross-links: bow OUTWARD from the pentagon centre so arcs
        // stay on the outside of the hub and never tangle with flow lines.
        const dcx=mx-MESH_CX, dcy=my-MESH_CY;
        const dlen=Math.hypot(dcx,dcy)||1;
        const bow=Math.min(110, len*0.26);
        cx=mx+dcx/dlen*bow; cy=my+dcy/dlen*bow;
    }
    return `M${ax} ${ay} Q${cx} ${cy} ${bx} ${by}`;
};

// Mini airplane — points in +X direction, animateMotion rotates it to path
const Plane = ({color}) => (
    <g transform="translate(-10,-5)">
        {/* fuselage */}
        <ellipse cx="10" cy="5" rx="9" ry="3" fill={color}/>
        {/* nose cone */}
        <ellipse cx="18" cy="5" rx="3" ry="2" fill={color}/>
        {/* wings */}
        <polygon points="10,5 6,0 15,3"  fill={color} opacity=".85"/>
        <polygon points="10,5 6,10 15,7" fill={color} opacity=".85"/>
        {/* tail fin */}
        <polygon points="1,5 0,2 3,5"   fill={color} opacity=".7"/>
        {/* engine glow */}
        <ellipse cx="-1" cy="5" rx="4" ry="2" fill={color} opacity=".4" style={{filter:'blur(2px)'}}/>
    </g>
);

// Edge component — always renders the static line; if active renders plane
const Edge = ({edge, nodesMap, activePlanes}) => {
    const path = getEdgePath(edge, nodesMap);
    if(!path) return null;

    const plane = (activePlanes || []).find(p => p.edgeId === edge.id);
    const isActive = !!plane;
    const planeReversed = isActive && plane.fromId === edge.b;
    const planePath = planeReversed ? reversePath(path, edge, nodesMap) : path;
    const planeColor = isActive ? plane.color : '#3B82F6';
    const isFlow = edge.type === 'flow';

    return (
        <g>
            {/* Uniform ambient glow — same for all edges */}
            {!isActive && (
                <path d={path} stroke="rgba(0,180,255,0.06)" strokeWidth={6} fill="none"/>
            )}
            {/* Base line — uniform dash style for all edges */}
            <path d={path}
                stroke={isActive ? planeColor : "rgba(0,180,255,0.28)"}
                strokeWidth={isActive ? 2 : 1.5} fill="none"
                strokeDasharray={isActive ? "none" : "6 6"}
                opacity={1}/>
            {/* Active glow */}
            {isActive && <path d={path} stroke={planeColor} strokeWidth="5" fill="none" opacity=".35"
                style={{filter:`drop-shadow(0 0 12px ${planeColor})`}}/>}
            {/* Flowing light orb — replaces airplane */}
            {isActive && (
                <g style={{filter:`drop-shadow(0 0 8px ${planeColor}) drop-shadow(0 0 20px ${planeColor}88)`}}>
                    <animateMotion dur="1.8s" repeatCount="indefinite" path={planePath}/>
                    <circle r="5" fill={planeColor} opacity="1"/>
                    <circle r="11" fill={planeColor} opacity="0.2"/>
                </g>
            )}
        </g>
    );
};

// Reverse a path: swap endpoints, keep the same arc (mirror control point bow)
const reversePath = (path, edge, nodesMap) => {
    const A = nodesMap[edge.a];
    const B = nodesMap[edge.b];
    if(!A||!B) return path;
    // Swap A↔B so the plane departs from B toward A
    const ax=B.x+NW/2, ay=B.y+NH/2;
    const bx=A.x+NW/2, by=A.y+NH/2;
    const mx=(ax+bx)/2,  my=(ay+by)/2;
    const len=Math.hypot(bx-ax, by-ay)||1;
    let cx, cy;
    if(edge.type==='flow'){
        // Mirror: negate perpendicular bow so the arc traces the same curve
        const dx=bx-ax, dy=by-ay;
        const nx=-dy/len, ny=dx/len;
        const bow=Math.min(45, len*0.09);
        // Original bow was +left-of-A→B; reversed is +left-of-B→A = -left-of-A→B
        cx=mx-nx*bow; cy=my-ny*bow;
    } else {
        // Mesh: outward bow from pentagon centre is symmetric for either direction
        const dcx=mx-MESH_CX, dcy=my-MESH_CY;
        const dlen=Math.hypot(dcx,dcy)||1;
        const bow=Math.min(110, len*0.26);
        cx=mx+dcx/dlen*bow; cy=my+dcy/dlen*bow;
    }
    return `M${ax} ${ay} Q${cx} ${cy} ${bx} ${by}`;
};

// ─── AGENT ROBOT (original style) ─────────────────────────────────────────────
const AgentRobot = ({node, isSelected}) => {
    const isRunning  = node.status==='running';
    const isHealing  = node.status==='healing';
    const isDone     = node.status==='completed';
    const isError    = node.status==='error';
    const isBlinking = node.status==='blinking';

    const pc = isError?'#EF4444':isDone?'#10B981':isHealing?'#F59E0B':
               (isRunning||isBlinking)?node.color:'#6B7280';

    return (
        <div style={{position:'relative', display:'flex', flexDirection:'column', alignItems:'center', width:128}}>

            {/* ── AURA: robot silhouette glow via drop-shadow filter ── */}
            <motion.div
                animate={{
                    y:[0,-12,0],
                    filter:(isRunning||isHealing)?[
                        `drop-shadow(0 0 4px ${pc}aa) drop-shadow(0 0 14px ${pc}55)`,
                        `drop-shadow(0 0 14px ${pc}) drop-shadow(0 0 32px ${pc}99) drop-shadow(0 0 56px ${pc}44)`,
                        `drop-shadow(0 0 4px ${pc}aa) drop-shadow(0 0 14px ${pc}55)`,
                    ]:isBlinking?[
                        `drop-shadow(0 0 4px ${pc}88) drop-shadow(0 0 12px ${pc}33)`,
                        `drop-shadow(0 0 22px ${pc}) drop-shadow(0 0 44px ${pc}bb) drop-shadow(0 0 72px ${pc}55)`,
                        `drop-shadow(0 0 4px ${pc}88) drop-shadow(0 0 12px ${pc}33)`,
                    ]:isDone?`drop-shadow(0 0 8px ${pc}99) drop-shadow(0 0 18px ${pc}44)`:
                      isSelected?`drop-shadow(0 0 12px ${pc}88) drop-shadow(0 0 28px ${pc}44)`:'none',
                }}
                transition={{
                    y:{duration:3.5,repeat:Infinity,ease:'easeInOut'},
                    filter:(isRunning||isHealing)?{duration:1.6,repeat:Infinity,ease:'easeInOut'}:
                           isBlinking?{duration:0.55,repeat:Infinity,ease:'easeInOut'}:{duration:0.4},
                }}
                style={{position:'relative',zIndex:1,width:96,display:'flex',flexDirection:'column',alignItems:'center'}}
            >
                {/* Antenna */}
                <div style={{width:4,height:16,background:'#475569',borderRadius:'2px 2px 0 0',position:'relative',zIndex:0}}>
                    <motion.div animate={{opacity:[0.3,1,0.3]}} transition={{duration:1.5,repeat:Infinity}}
                        style={{position:'absolute',top:-8,left:-4,width:12,height:12,borderRadius:'50%',background:pc,boxShadow:`0 0 10px ${pc}`}}/>
                </div>

                {/* Head */}
                <motion.div
                    animate={isRunning?{rotateY:[-10,10,-10]}:{}}
                    transition={{duration:2,repeat:Infinity,ease:'easeInOut'}}
                    className={`bg-gradient-to-b ${node.theme} rounded-[20px] border-b-4 border-black/30 shadow-[0_5px_15px_rgba(0,0,0,0.5)] z-10 flex items-center justify-center`}
                    style={{width:64,height:48}}
                >
                    <div style={{width:48,height:20,background:'#0f172a',borderRadius:9999,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',border:'1px solid #334155',boxShadow:'inset 0 2px 4px rgba(0,0,0,0.5)'}}>
                        {isRunning ? (
                            <motion.div animate={{x:[-12,12,-12]}} transition={{duration:1.5,repeat:Infinity,ease:'linear'}}
                                style={{width:16,height:8,borderRadius:9999,background:pc,boxShadow:`0 0 10px ${pc}`}}/>
                        ) : isBlinking ? (
                            <motion.div animate={{opacity:[1,0,1]}} transition={{duration:0.55,repeat:Infinity}}
                                style={{width:16,height:8,borderRadius:9999,background:pc,boxShadow:`0 0 14px ${pc}`}}/>
                        ) : isHealing ? (
                            <motion.div animate={{rotate:360}} transition={{duration:2,repeat:Infinity,ease:'linear'}}
                                style={{width:12,height:12,borderRadius:'50%',border:`2px dashed ${pc}`}}/>
                        ) : (
                            <div style={{width:24,height:8,display:'flex',justifyContent:'space-between'}}>
                                <div style={{width:8,height:8,borderRadius:'50%',background:pc,boxShadow:`0 0 8px ${pc}`}}/>
                                <div style={{width:8,height:8,borderRadius:'50%',background:pc,boxShadow:`0 0 8px ${pc}`}}/>
                            </div>
                        )}
                    </div>
                </motion.div>

                {/* Neck */}
                <div style={{width:16,height:8,background:'#475569',zIndex:0}}/>

                {/* Body */}
                <div className={`bg-gradient-to-b ${node.theme} rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.6)] border-b-4 border-black/30`}
                    style={{width:80,height:80,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',zIndex:2}}>
                    {/* Icon */}
                    <div style={{width:48,height:48,background:'#0f172a',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',position:'relative',border:`2px solid ${pc}`,boxShadow:`inset 0 0 15px ${pc}40`}}>
                        <img src={node.icon} alt={node.label} style={{width:28,height:28,objectFit:'contain',filter:node.id==='git'?'invert(1)':'none',position:'relative',zIndex:1}}/>
                        {isRunning && <motion.div animate={{rotate:360}} transition={{duration:3,repeat:Infinity,ease:'linear'}}
                            style={{position:'absolute',inset:0,borderRadius:'50%',border:'2px solid transparent',borderTopColor:'rgba(255,255,255,0.3)'}}/>}
                    </div>
                    {/* Arms */}
                    <motion.div animate={{y:[0,-3,0]}} transition={{duration:2,repeat:Infinity,delay:.2}}
                        className={`absolute bg-gradient-to-b ${node.theme} rounded-full shadow-md border-b-2 border-black/30`}
                        style={{left:-12,top:16,width:16,height:40}}/>
                    <motion.div animate={{y:[0,-3,0]}} transition={{duration:2,repeat:Infinity,delay:.5}}
                        className={`absolute bg-gradient-to-b ${node.theme} rounded-full shadow-md border-b-2 border-black/30`}
                        style={{right:-12,top:16,width:16,height:40}}/>
                </div>

                {/* Thruster */}
                <div style={{width:32,height:12,background:'#334155',borderRadius:'0 0 8px 8px',zIndex:1}}/>
                <motion.div
                    animate={{height:isRunning?[15,25,15]:[10,15,10], opacity:[0.6,1,0.6]}}
                    transition={{duration:.2,repeat:Infinity}}
                    style={{width:24,borderRadius:'0 0 9999px 9999px',background:`linear-gradient(to bottom, ${pc}, transparent)`,filter:'blur(3px)',marginTop:-4}}
                />
            </motion.div>

            {/* Label */}
            <div style={{marginTop:24,display:'flex',flexDirection:'column',alignItems:'center',zIndex:10}}>
                <span style={{fontWeight:700,fontSize:11,letterSpacing:2,color:'white',background:'rgba(0,0,0,0.6)',padding:'3px 12px',borderRadius:9999,border:`1px solid ${isSelected?node.color+'88':'rgba(255,255,255,0.1)'}`,backdropFilter:'blur(8px)',whiteSpace:'nowrap',boxShadow:isSelected?`0 0 12px ${node.color}44`:'none',transition:'all 0.3s'}}>
                    {node.label}
                </span>
                <span style={{fontSize:9,textTransform:'uppercase',fontWeight:700,letterSpacing:2,marginTop:4,padding:'1px 8px',borderRadius:3,background:'rgba(0,0,0,0.4)',color:pc,whiteSpace:'nowrap'}}>
                    {isBlinking?'QUEUED':node.status}{node.time&&node.time!=='-'?` (${node.time})`:''}
                </span>
            </div>
        </div>
    );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App = () => {
    const [nodes,setNodes]               = useState(NODES_INIT);
    const [history,setHistory]           = useState([]);
    const [current,setCurrent]           = useState([]);
    const [prompt,setPrompt]             = useState(null);
    const [inputVal,setInputVal]         = useState('');
    const [wsState,setWsState]           = useState('connecting');
    const [activePlanes,setActivePlanes] = useState([]);
    const [containerH,setContainerH]     = useState(0);
    const [selectedAgent,setSelectedAgent] = useState(null);
    const ws             = useRef(null);
    const termEndRef     = useRef(null);
    const termBodyRef    = useRef(null);
    const nodesRef       = useRef(nodes);
    const activeAgentRef = useRef(null);  // tracks which agent phase is current
    const qlikJiraSubflowRef = useRef(false);  // true while Qlik has delegated to JIRA

    useEffect(()=>{ nodesRef.current = nodes; }, [nodes]);
    // Track terminal container height so the active section always fills the viewport
    useEffect(()=>{
        if (!termBodyRef.current) return;
        const ro = new ResizeObserver(entries => {
            setContainerH(entries[0].contentRect.height);
        });
        ro.observe(termBodyRef.current);
        return () => ro.disconnect();
    }, []);
    // Auto-scroll to bottom (vertical only); keep horizontal scroll pinned left.
    // scrollIntoView was centering the view horizontally — use manual scroll instead.
    useEffect(()=>{
        const b = termBodyRef.current;
        if (b) { b.scrollTop = b.scrollHeight; b.scrollLeft = 0; }
    }, [current,prompt]);

    const addLine   = t => setCurrent(p=>[...p,t]);
    const upNode    = (id,u)  => setNodes(ns=>ns.map(n=>n.id===id?{...n,...u}:n));
    const flyPlane  = (edgeId,fromId,toId,color) => setActivePlanes([{edgeId,fromId,toId,color}]);
    const flyPlanes = (planes) => setActivePlanes(planes);
    const stopPlane = ()      => setActivePlanes([]);

    // ── WebSocket setup — extracted so turbine can reconnect ──────────────────
    const attachWS = React.useCallback((socket) => {
        socket.onopen  = () => { console.log('[WS] Connected'); setWsState('ready_to_start'); };
        socket.onclose = (e) => { console.warn('[WS] Closed:', e.code, e.reason); setWsState('disconnected'); };
        socket.onerror = (e) => { console.error('[WS] Error:', e); };
        socket.onmessage = (event) => {
            let data;
            try { data = JSON.parse(event.data); } catch(e) { console.error('[WS] JSON parse failed:', event.data); return; }
            console.log('[WS] Message:', data.type, data.message?.substring(0, 80));

            try {
            if (data.type === 'log') {
                addLine(data.message);
                const m = data.message;
                // JIRA
                if (m.includes('Jira Agent analyzing ticket')) {
                    activeAgentRef.current = 'jira';
                    upNode('jira', {status:'blinking', time:'...'});
                }
                if (m.includes('TICKET REQUIREMENTS')) {
                    upNode('jira', {status:'completed', time:'Done'});
                    if (qlikJiraSubflowRef.current) {
                        // JIRA finished the Qlik-requested ticket → hand back to Qlik.
                        // Two links feed Qlik: requirements (JIRA) + VDS (Dremio).
                        qlikJiraSubflowRef.current = false;
                        activeAgentRef.current = 'qlik';
                        upNode('qlik', {status:'blinking', time:'...'});
                        flyPlanes([
                            {edgeId:'j-q',  fromId:'jira',   toId:'qlik', color:'#3B82F6'},
                            {edgeId:'dr-q', fromId:'dremio', toId:'qlik', color:'#F97316'},
                        ]);
                    } else {
                        activeAgentRef.current = 'doc';
                        flyPlane('j-d','jira','doc','#3B82F6');
                    }
                }
                // DOC
                if (m.includes('DOCUMENTATION AGENT')) { activeAgentRef.current = 'doc'; upNode('doc', {status:'blinking', time:'...'}); }
                if (m.includes('Document saved:')) {
                    activeAgentRef.current = 'dremio';
                    upNode('doc', {status:'completed', time:'Done'});
                    flyPlane('d-dr','doc','dremio','#10B981');
                }
                // DREMIO
                if (m.includes('DREMIO AGENT'))    { activeAgentRef.current = 'dremio'; upNode('dremio', {status:'blinking', time:'...'}); }
                if (m.includes('Validation FAILED')) upNode('dremio', {status:'error'});
                if (m.includes('Intercepting error') || m.includes('auto-fix') || m.includes('Rewriting SQL')) upNode('dremio', {status:'healing'});
                if (m.includes('VDS created successfully')) {
                    activeAgentRef.current = 'qlik';
                    upNode('dremio', {status:'completed', time:'Done'});
                    flyPlane('dr-q','dremio','qlik','#F97316');
                }
                // QLIK
                if (m.includes('QLIK AGENT')) { activeAgentRef.current = 'qlik'; upNode('qlik', {status:'blinking', time:'...'}); }
                // Qlik delegates to JIRA: browse Qlik ticket menu appeared → JIRA takes over.
                if ((m.includes('existing Qlik ticket') || m.includes('Qlik backlog')) && !qlikJiraSubflowRef.current) {
                    qlikJiraSubflowRef.current = true;
                    activeAgentRef.current = 'jira';
                    upNode('jira', {status:'blinking', time:'...'});
                    upNode('qlik', {status:'running', time:'...'});  // delegated → steady glow
                    flyPlane('j-q','qlik','jira','#22C55E');          // Qlik → JIRA request
                }
                if (m.includes('QLIK SENSE DASHBOARD READY')) {
                    activeAgentRef.current = 'git';
                    upNode('qlik', {status:'completed', time:'Done'});
                    flyPlane('q-g','qlik','git','#22C55E');
                }
                // GIT
                if (m.includes('GITHUB AGENT') || m.includes('Validating local codebase')) { activeAgentRef.current = 'git'; upNode('git', {status:'blinking', time:'...'}); }
                if (m.includes('WORKFLOW COMPLETE')) { activeAgentRef.current = null; upNode('git', {status:'completed', time:'Done'}); stopPlane(); }

            } else if (data.type === 'prompt') {
                setPrompt(data.message);
                setWsState('waiting_input');
                // Force the active agent to blinking on every prompt — stays glowing
                // for the whole phase (no 'waiting' gray-out, which killed the glow).
                const aid = activeAgentRef.current;
                if (aid) setNodes(ns => ns.map(n => n.id === aid ? {...n, status:'blinking'} : n));
            } else if (data.type === 'error') {
                addLine(`[SYSTEM ERROR] ${data.message}`);
            } else if (data.type === 'done') {
                setWsState('done'); stopPlane();
            }
            } catch(err) { console.error('[WS] Handler error:', err); }
        };
    }, []);

    const connectWS = React.useCallback(() => {
        if (ws.current && ws.current.readyState < 2) ws.current.close();
        console.log('[WS] Connecting...');
        setWsState('connecting');
        const socket = new WebSocket('ws://localhost:8000/ws');
        ws.current = socket;
        attachWS(socket);
    }, [attachWS]);

    useEffect(() => {
        connectWS();
        return () => { if(ws.current) ws.current.close(); };
    }, []);  // eslint-disable-line react-hooks/exhaustive-deps

    const handleSubmit = e => {
        e.preventDefault();
        if (!prompt) return;
        const echo = '  → ' + inputVal;
        ws.current.send(inputVal);
        setInputVal(''); setPrompt(null); setWsState('processing');
        // Active agent keeps blinking until a log message marks it completed.
        // Flush active session (+ echo of answer) into history; start fresh
        setCurrent(prev => {
            setHistory(h => [...h, [...prev, echo]]);
            return [];
        });
    };
    const isSpinning = ['processing','waiting_input'].includes(wsState);
    const nodesMap   = Object.fromEntries(nodes.map(n=>[n.id,n]));

    return (
        <div style={{display:'flex',height:'100vh',width:'100vw',overflow:'hidden',background:'#050505'}}>

            {/* ── LEFT CANVAS ── */}
            <div style={{flex:1,position:'relative',display:'flex',flexDirection:'column',overflow:'hidden'}} className="grid-bg">
                <video autoPlay loop muted playsInline className="video-bg">
                    <source src="/image/asl_airlines_edited.mp4" type="video/mp4"/>
                </video>

                {/* Header */}
                <div className="glass" style={{height:68,display:'flex',alignItems:'center',padding:'0 24px',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,0.08)',position:'relative',zIndex:20}}>
                    <div style={{display:'flex',alignItems:'center',gap:16}}>
                        {/* ASL logo — white card, shadow ring, generous padding for sharpness */}
                        <div style={{
                            background:'#ffffff',
                            borderRadius:8,
                            padding:'7px 16px',
                            display:'flex',
                            alignItems:'center',
                            justifyContent:'center',
                            boxShadow:'0 0 0 1.5px rgba(27,58,107,0.30), 0 2px 12px rgba(27,58,107,0.20), 0 0 28px rgba(89,163,217,0.18)',
                            flexShrink:0, minWidth:'max-content',
                        }}>
                            <img
                                src="/image/asllogo.jpg"
                                alt="ASL Airlines Belgium"
                                style={{
                                    height:38,
                                    width:'auto',
                                    display:'block',
                                    objectFit:'contain',
                                    imageRendering:'auto',
                                }}
                                onError={e=>{
                                    /* fallback: try jfif, then hide */
                                    const t = e.currentTarget;
                                    if(!t.dataset.tried){t.dataset.tried='1';t.src='/image/asllogo.jfif';}
                                    else{t.style.display='none';}
                                }}
                            />
                        </div>
                        {/* Vertical rule in ASL navy */}
                        <div style={{width:1,height:44,background:'linear-gradient(180deg,transparent,rgba(27,58,107,0.6) 20%,rgba(89,163,217,0.4) 50%,rgba(27,58,107,0.6) 80%,transparent)',flexShrink:0}}/>
                        {/* 3-D gradient title */}
                        <h1 style={{
                            margin:0,
                            fontWeight:800,
                            fontSize:16,
                            letterSpacing:'0.6px',
                            lineHeight:1,
                            background:'linear-gradient(180deg, #A8D8F0 0%, #5BA3D9 42%, #1B3A6B 100%)',
                            WebkitBackgroundClip:'text',
                            WebkitTextFillColor:'transparent',
                            backgroundClip:'text',
                            animation:'title-glow 3s ease-in-out infinite',
                            whiteSpace:'nowrap',
                        }}>DataLake Workflow Orchestrator</h1>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <div style={{display:'flex',gap:6}}>
                            {[['disconnected','#ef4444'],['connecting','#f59e0b'],['ready_to_start','#10b981']].map(([s,c])=>{
                                const on=(s===wsState)||(s==='ready_to_start'&&['processing','waiting_input','done'].includes(wsState));
                                return <div key={s} style={{width:12,height:12,borderRadius:'50%',background:on?c:`${c}30`,boxShadow:on?`0 0 10px ${c}`:'none',transition:'all .3s'}}/>;
                            })}
                        </div>
                        <button onClick={()=>window.location.reload()} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#94a3b8',background:'rgba(255,255,255,0.05)',padding:'6px 12px',borderRadius:6,border:'1px solid rgba(255,255,255,0.1)',cursor:'pointer'}}>
                            <RefreshCw size={13}/> Restart
                        </button>
                    </div>
                </div>

                {/* Canvas */}
                <div style={{flex:1,position:'relative',overflow:'auto',zIndex:10,display:'flex',justifyContent:'center',alignItems:'flex-start',paddingTop:30,paddingBottom:30}}>
                    <div style={{position:'relative',width:980,height:960,flexShrink:0}}>
                        {/* Edges SVG layer */}
                        <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}>
                            <defs>
                                <filter id="ef">
                                    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
                                    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                            </defs>
                            {/* Render mesh cross-links first (behind), flow edges on top */}
                            {EDGE_DEFS.filter(e=>e.type==='mesh').map(edge=>(
                                <Edge key={edge.id} edge={edge} nodesMap={nodesMap} activePlanes={activePlanes}/>
                            ))}
                            {EDGE_DEFS.filter(e=>e.type==='flow').map(edge=>(
                                <Edge key={edge.id} edge={edge} nodesMap={nodesMap} activePlanes={activePlanes}/>
                            ))}
                        </svg>
                        {/* Nodes */}
                        {nodes.map(node=>(
                            <motion.div key={node.id}
                                style={{position:'absolute',left:node.x,top:node.y,zIndex:10}}
                                initial={{opacity:0,scale:.9}} animate={{opacity:1,scale:1}}>
                                <AgentRobot node={node} isSelected={selectedAgent===node.id&&wsState==='ready_to_start'}/>
                            </motion.div>
                        ))}
                    </div>
                </div>
            </div>

            {/* ── RIGHT CONSOLE PANEL ── */}
            <div className="console-panel">

                {/* Turbine engine button */}
                <div className="engine-panel">
                    <div className="engine-label">Engine Control Unit</div>

                    {/* Agent Start Selector — visible when connected and idle */}
                    {(wsState==='ready_to_start'||wsState==='done') && (
                        <div style={{width:'100%',marginBottom:14}}>
                            <div style={{fontFamily:'Orbitron,monospace',fontSize:7,letterSpacing:'2px',color:'rgba(0,180,255,0.35)',marginBottom:7,textAlign:'center'}}>
                                START FROM AGENT
                            </div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:4,justifyContent:'center'}}>
                                {NODES_INIT.map(n=>{
                                    const short=n.id==='doc'?'Doc':n.id==='git'?'Git':n.id.charAt(0).toUpperCase()+n.id.slice(1);
                                    const sel=selectedAgent===n.id;
                                    return (
                                        <button key={n.id}
                                            onClick={()=>setSelectedAgent(s=>s===n.id?null:n.id)}
                                            style={{
                                                background:sel?`${n.color}22`:'rgba(255,255,255,0.03)',
                                                border:`1px solid ${sel?n.color:'rgba(255,255,255,0.1)'}`,
                                                color:sel?n.color:'rgba(255,255,255,0.38)',
                                                padding:'4px 10px',borderRadius:4,cursor:'pointer',
                                                fontFamily:'JetBrains Mono,monospace',fontSize:9,
                                                letterSpacing:'0.5px',transition:'all 0.18s',
                                                boxShadow:sel?`0 0 10px ${n.color}33`:'none',
                                            }}>
                                            {short}
                                        </button>
                                    );
                                })}
                            </div>
                            {selectedAgent && (
                                <div style={{textAlign:'center',marginTop:6,fontFamily:'JetBrains Mono,monospace',fontSize:8,color:'rgba(0,180,255,0.45)',letterSpacing:'1px'}}>
                                    ↳ {NODES_INIT.find(n=>n.id===selectedAgent)?.label}
                                </div>
                            )}
                        </div>
                    )}

                    <motion.button className="turb-btn"
                        onClick={()=>{
                            if(wsState==='ready_to_start'){
                                ws.current.send("START_WORKFLOW");
                                setWsState("processing");
                                setHistory([]);setCurrent([]);
                                stopPlane();
                                qlikJiraSubflowRef.current = false;
                                activeAgentRef.current = selectedAgent || 'jira';
                                setNodes(NODES_INIT.map(n=>n.id===activeAgentRef.current?{...n,status:'blinking'}:n));
                                setSelectedAgent(null);
                            }
                            else if(wsState==='disconnected'||wsState==='done'){connectWS();}
                        }}
                        disabled={isSpinning||wsState==='connecting'}
                        whileHover={wsState==='ready_to_start'?{scale:1.05}:{}}
                        animate={isSpinning?{x:[-1,1,-1,1,0],y:[-1,1,-1,1,0]}:{}}
                        transition={isSpinning?{duration:.1,repeat:Infinity}:{}}
                        style={{
                            borderRadius:'50%', padding:6,
                            background:isSpinning?'radial-gradient(circle,rgba(255,80,0,.15) 0%,transparent 70%)':'radial-gradient(circle,rgba(0,80,160,.15) 0%,transparent 70%)',
                            boxShadow:isSpinning?'0 0 60px rgba(255,100,0,.3)':wsState==='ready_to_start'?'0 0 40px rgba(0,180,255,.2)':'none',
                            opacity:(wsState==='connecting')?0.5:1,
                        }}>
                        <TurbineSVG spinning={isSpinning} idle={wsState==='ready_to_start'}/>
                    </motion.button>

                    {isSpinning && <motion.div style={{width:70,height:22,background:'radial-gradient(ellipse,rgba(255,110,0,.5) 0%,transparent 70%)',filter:'blur(6px)',marginTop:-6}}
                        animate={{opacity:[.5,1,.5],scaleY:[1,1.5,1]}} transition={{duration:.15,repeat:Infinity}}/>}

                    {/* Status + RPM */}
                    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:10}}>
                        <motion.div style={{width:8,height:8,borderRadius:'50%',background:isSpinning?'#F97316':wsState==='ready_to_start'?'#00b4ff':'#374151'}}
                            animate={isSpinning?{opacity:[1,.2,1]}:wsState==='ready_to_start'?{opacity:[1,.5,1]}:{}}
                            transition={{duration:isSpinning?.3:2,repeat:Infinity}}/>
                        <span style={{fontFamily:'Orbitron,monospace',fontSize:9,letterSpacing:'2.5px',color:isSpinning?'#F97316':wsState==='ready_to_start'?'#00b4ff':'#374151'}}>
                            {isSpinning?'AFTERBURNER ENGAGED':wsState==='ready_to_start'?'TURBINE STANDBY':wsState==='done'?'CYCLE COMPLETE':'OFFLINE'}
                        </span>
                    </div>
                    <div style={{display:'flex',gap:3,marginTop:10}}>
                        {Array.from({length:20}).map((_,i)=>(
                            <motion.span key={i} className="rpm-bar"
                                style={{background:isSpinning?(i<10?'#10B981':i<15?'#F59E0B':'#EF4444'):(i<3?'#00b4ff':'rgba(255,255,255,0.07)')}}
                                animate={isSpinning&&i>=13?{opacity:[1,.3,1]}:{}} transition={{duration:.1+i*.02,repeat:Infinity}}/>
                        ))}
                    </div>
                </div>

                {/* Executive Event Log header */}
                <div style={{padding:'8px 18px',borderBottom:'1px solid rgba(0,180,255,0.14)',background:'rgba(0,180,255,0.03)',display:'flex',alignItems:'center',gap:8}}>
                    <Activity size={13} color="#00b4ff"/>
                    <span style={{fontFamily:'Orbitron,monospace',fontSize:8,letterSpacing:'3px',textTransform:'uppercase',color:'rgba(0,180,255,0.7)'}}>Executive Event Log</span>
                    <span style={{marginLeft:'auto',fontFamily:'JetBrains Mono',fontSize:10,color:'rgba(0,180,255,0.3)'}}>{history.reduce((s,sess)=>s+sess.length,0)+current.length} LINES</span>
                </div>

                {/* Terminal body */}
                <div ref={termBodyRef} style={{flex:1,overflowY:'auto',overflowX:'auto',padding:'0 12px 12px',display:'flex',flexDirection:'column',alignItems:'flex-start'}}>

                    {/* ── HISTORY: past sessions pushed into scrollback ── */}
                    {history.map((session,si)=>(
                        <div key={si} style={{flexShrink:0, minWidth:'max-content', paddingTop:12, borderBottom:'1px solid rgba(0,180,255,0.08)', paddingBottom:8, marginBottom:4}}>
                            {session.map((line,li)=>{
                                const isSep = line.startsWith('===');
                                const isHdr = !isSep && (line.includes('AGENT')||line.includes('WORKFLOW')||line.includes('ASL AIRLINES'));
                                const isErr = line.startsWith('[SYSTEM ERROR]');
                                const cls   = `t-line${isSep?' t-sep':isHdr?' t-hdr':isErr?' t-err':''}`;
                                return (
                                    <div key={li} className={cls} style={{opacity:0.55}}>
                                        {!isSep && !isHdr && !isErr && <span style={{color:'rgba(0,180,255,0.18)',marginRight:6}}>›</span>}
                                        {line}
                                    </div>
                                );
                            })}
                        </div>
                    ))}

                    {/* ── ACTIVE SESSION: always fills the viewport height ── */}
                    <div style={{flexShrink:0, minWidth:'max-content', minHeight: containerH ? containerH : '70vh', display:'flex', flexDirection:'column', paddingTop:12, gap:4}}>
                        {history.length===0 && current.length===0 && (
                            <div className="t-empty">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00b4ff" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                                <div className="t-empty-lbl">AWAITING PIPELINE ACTIVATION</div>
                            </div>
                        )}
                        {current.map((line,i)=>{
                            const isSep = line.startsWith('===');
                            const isHdr = !isSep && (line.includes('AGENT')||line.includes('WORKFLOW')||line.includes('ASL AIRLINES'));
                            const isErr = line.startsWith('[SYSTEM ERROR]');
                            const cls   = `t-line${isSep?' t-sep':isHdr?' t-hdr':isErr?' t-err':''}`;
                            return (
                                <div key={i} className={cls}>
                                    {!isSep && !isHdr && !isErr && <span style={{color:'rgba(0,180,255,0.28)',marginRight:6}}>›</span>}
                                    {line}
                                </div>
                            );
                        })}

                        {/* Prompt input */}
                        {prompt && (
                        <motion.div initial={{opacity:0,y:6}} animate={{opacity:1,y:0}} className="t-prompt-wrap">
                            <span className="t-prompt-text">{prompt}</span>
                            <form style={{flex:1,display:'flex',alignItems:'center',gap:6}} onSubmit={handleSubmit}>
                                <input autoFocus id="pipeline-prompt" name="pipeline-prompt" autoComplete="off" className="t-prompt-input" value={inputVal}
                                    onChange={e=>setInputVal(e.target.value)} placeholder="input..."/>
                                <div className="t-cursor"/>
                            </form>
                        </motion.div>
                        )}
                        <div ref={termEndRef}/>
                    </div>{/* end active session */}
                </div>{/* end terminal body */}

                {/* Footer */}
                <div style={{padding:'6px 18px',borderTop:'1px solid rgba(0,180,255,0.12)',background:'rgba(0,0,0,0.55)',display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontFamily:'Orbitron,monospace',fontSize:7.5,letterSpacing:'2.5px',color:'rgba(0,180,255,0.3)'}}>DnT INFOTECH</span>
                    <span style={{fontFamily:'Orbitron,monospace',fontSize:7.5,letterSpacing:'2.5px',color:'rgba(0,180,255,0.3)'}}>ADL PIPELINE v5.0</span>
                </div>
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
